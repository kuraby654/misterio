<h1>ACCESO RESTRINGIDO</h1>
<p>Solo aquellos que entienden podrán avanzar...</p>

<input type="text" id="clave" placeholder="Ingresa la clave">

<button onclick="check()">Entrar</button>

<script>

  if(c === "silencio"){
    window.location="nivel2.html";
  } else {
    alert("Clave incorrecta");
  }
}
